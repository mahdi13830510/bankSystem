<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EliraPay — Admin · Audit Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon"><i class="ti ti-building-bank"></i></div><span class="sidebar-logo-text">EliraPay</span></div>
  <div class="sidebar-role-badge"><i class="ti ti-shield-lock"></i> Admin Panel</div>
  <div class="sidebar-section">Overview</div>
  <a class="nav-item" href="/admin/dashboard/admin-dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
  <div class="sidebar-section">Management</div>
  <a class="nav-item" href="/admin/users/admin-users.html"><i class="ti ti-users"></i> Users</a>
  <a class="nav-item" href="/admin/accounts/admin-accounts.html"><i class="ti ti-wallet"></i> Accounts</a>
  <a class="nav-item" href="/admin/loans/admin-loans.html"><i class="ti ti-coin"></i> Loans</a>
  <a class="nav-item" href="/admin/transactions/admin-transactions.html"><i class="ti ti-arrows-right-left"></i> Transactions</a>
  <a class="nav-item" href="/admin/installments/admin-installments.html"><i class="ti ti-receipt"></i> Installments</a>
  <div class="sidebar-section">Security</div>
  <a class="nav-item" href="/admin/fraud/admin-fraud.html"><i class="ti ti-shield-exclamation"></i> Fraud Reports</a>
  <a class="nav-item active" href="/admin/auditlogs/admin-auditlogs.html"><i class="ti ti-file-analytics"></i> Audit Logs</a>
  <div class="sidebar-section">Communication</div>
  <a class="nav-item" href="/admin/notifications/admin-notifications.html"><i class="ti ti-bell"></i> Notifications</a>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar-sm" id="sidebar-avatar">AD</div>
      <div class="user-info"><div class="user-name-sm" id="sidebar-name">Admin</div><div class="user-role-sm">Administrator</div></div>
      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i></button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Audit Logs</h1><p>System-wide activity and security events</p></div>
    <a class="back-btn" href="/admin/dashboard/admin-dashboard.html"><i class="ti ti-arrow-left"></i> Dashboard</a>
  </div>
  <div class="content">
    <div class="filters-card">
      <div class="filters-row">
        <div class="search-wrap">
          <i class="ti ti-search"></i>
          <input class="search-input" id="search" type="text" placeholder="Search by action or description…"/>
        </div>
        <select class="filter-select" id="filter-severity">
          <option value="">All Severities</option>
          <option value="INFO">Info</option>
          <option value="WARNING">Warning</option>
          <option value="CRITICAL">Critical</option>
        </select>
        <button class="btn-filter primary" onclick="applyFilter()"><i class="ti ti-filter"></i> Filter</button>
        <button class="btn-filter ghost"   onclick="resetFilter()"><i class="ti ti-refresh"></i> Reset</button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-hdr"><span class="table-hdr-title">Activity Timeline</span><span class="table-count" id="table-count">—</span></div>
      <div id="log-list"><div class="empty-state"><i class="ti ti-loader-2"></i><p>Loading…</p></div></div>
      <div class="pagination" id="pagination" style="display:none;">
        <span class="pag-info" id="pag-info">—</span>
        <div class="pag-btns" id="pag-btns"></div>
      </div>
    </div>
  </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
