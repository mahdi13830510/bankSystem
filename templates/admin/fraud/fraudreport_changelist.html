{% extends "admin/change_list.html" %}

{% block content %}
{% if summary_cards %}
<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px">
  {% for card in summary_cards %}
  <div style="background:#fff;border:1px solid #ddd;border-radius:6px;padding:16px 20px;flex:1;min-width:150px">
    <div style="font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.5px">{{ card.label }}</div>
    <div style="font-size:26px;font-weight:bold;margin-top:4px;color:{{ card.color }}">{{ card.value }}</div>
  </div>
  {% endfor %}
  <div style="display:flex;align-items:center">
    <a href="{{ model_dashboard_url }}"
       style="display:inline-block;padding:10px 18px;background:#417690;color:#fff;
              border-radius:6px;text-decoration:none;font-size:13px;white-space:nowrap">
      ML Model Dashboard
    </a>
  </div>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
